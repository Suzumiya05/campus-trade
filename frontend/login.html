<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 校园二手交易平台</title>
    <!-- 引入 Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- 引入 Axios CDN -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #4a6cf7;
            --primary-hover: #3651d5;
            --danger: #e8553d;
            --price: #e8553d;
            --text: #2d3748;
            --text-secondary: #718096;
            --text-light: #a0aec0;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.10), 0 4px 10px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei',
            'Helvetica Neue', Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 登录卡片容器 */
        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 40px 32px 48px;
            width: 100%;
            max-width: 400px;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .login-card:hover {
            border-color: #e8ecf4;
        }

        /* 卡片顶部装饰条 */
        .card-top-bar {
            height: 4px;
            background: linear-gradient(90deg, #4a6cf7 0%, #6d8cfb 100%);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            margin: -40px -32px 32px;
        }

        /* 标题 */
        .login-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 28px;
            text-align: center;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-title .icon {
            font-size: 1.8rem;
        }

        /* 错误提示 */
        .error-message {
            background: #fff5f5;
            color: var(--danger);
            border: 1px solid #fed7d7;
            padding: 10px 14px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: var(--font-sans);
            transition: var(--transition);
            background: #fafbfc;
            color: var(--text);
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
        }

        .input-group input::placeholder {
            color: var(--text-light);
        }

        /* 登录按钮 */
        .btn-login {
            width: 100%;
            padding: 14px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: var(--transition);
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }

        .btn-login:hover:not(:disabled) {
            background: var(--primary-hover);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-login:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 加载状态按钮内文字调整 */
        .btn-login.loading {
            position: relative;
            color: transparent;
        }

        .btn-login.loading::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 底部提示 */
        .footer-hint {
            text-align: center;
            margin-top: 24px;
            font-size: 0.82rem;
            color: var(--text-light);
            letter-spacing: 0.2px;
        }

        .footer-hint a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-hint a:hover {
            text-decoration: underline;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px 36px;
            }
            .card-top-bar {
                margin: -28px -20px 24px;
            }
            .login-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="login-card">
        <!-- 卡片顶部装饰条（与首页卡片风格呼应） -->
        <div class="card-top-bar"></div>

        <!-- 标题 -->
        <h2 class="login-title">
            <span class="icon">🎓</span> 用户登录
        </h2>

        <!-- 错误信息 -->
        <div v-if="errorMessage" class="error-message">
            ⚠️ {{ errorMessage }}
        </div>

        <!-- 用户名 -->
        <div class="input-group">
            <label for="username">用户名</label>
            <input
                    id="username"
                    v-model="username"
                    type="text"
                    placeholder="请输入用户名"
                    autocomplete="username"
                    @keyup.enter="login"
            />
        </div>

        <!-- 密码 -->
        <div class="input-group">
            <label for="password">密码</label>
            <input
                    id="password"
                    v-model="password"
                    type="password"
                    placeholder="请输入密码"
                    autocomplete="current-password"
                    @keyup.enter="login"
            />
        </div>

        <!-- 登录按钮 -->
        <button
                class="btn-login"
                :class="{ loading: loading }"
                :disabled="loading"
                @click="login"
        >
            {{ loading ? '登录中...' : '登 录' }}
        </button>

        <!-- 底部提示 -->
        <div class="footer-hint">
            还没有账号？<a href="#">联系管理员</a>
        </div>
    </div>
</div>

<script>
    (function() {
        const { createApp } = Vue;

        // 设置 Axios 全局 withCredentials，以便携带 Cookie
        axios.defaults.withCredentials = true;

        const app = createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    loading: false,
                    errorMessage: '',
                };
            },
            methods: {
                async login() {
                    // 清除之前的错误
                    this.errorMessage = '';

                    // 简单的前端校验
                    if (!this.username.trim()) {
                        this.errorMessage = '请输入用户名';
                        return;
                    }
                    if (!this.password) {
                        this.errorMessage = '请输入密码';
                        return;
                    }

                    this.loading = true;

                    try {
                        const response = await axios.post(
                            'http://localhost:8080/users/login',
                            {
                                username: this.username.trim(),
                                password: this.password,
                            },
                            {
                                // 单个请求也可再次确认 withCredentials（与全局设置不冲突）
                                withCredentials: true,
                                timeout: 10000,
                            }
                        );

                        const body = response.data;

                        if (body && body.code === 200) {
                            // 登录成功
                            // 可根据需要存储用户信息，此处直接跳转首页
                            // 注意：由于 Cookie 已被浏览器存储，后续首页请求会自动携带
                            window.location.href = 'index.html';
                        } else {
                            // 后端返回了非200的状态码
                            this.errorMessage = body?.message || '登录失败，请检查用户名或密码';
                        }
                    } catch (err) {
                        console.error('登录请求失败：', err);
                        if (err.code === 'ECONNABORTED') {
                            this.errorMessage = '请求超时，请检查网络或稍后重试';
                        } else if (err.message && err.message.includes('Network')) {
                            this.errorMessage = '网络连接失败，请确认后端服务已启动';
                        } else if (err.response) {
                            // 服务器返回了错误状态码（如401、500）
                            const status = err.response.status;
                            if (status === 401) {
                                this.errorMessage = '用户名或密码错误';
                            } else if (status === 403) {
                                this.errorMessage = '没有访问权限';
                            } else {
                                this.errorMessage =
                                    `服务器错误（${status}）：${err.response.statusText || '未知错误'}`;
                            }
                        } else {
                            this.errorMessage = '请求发送失败，请稍后重试';
                        }
                    } finally {
                        this.loading = false;
                    }
                },
            },
        });

        app.mount('#app');
    })();
</script>
</body>
</html>
